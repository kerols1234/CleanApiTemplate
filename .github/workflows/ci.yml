name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        # Excludes RequiresDocker tests (SQL Server via Testcontainers) — the container's self-signed
        # certificate fails the TLS handshake under the runner's OpenSSL. Run those locally with Docker.
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=RequiresDocker"
